version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
  agent_api:
    build:
      context: .
      dockerfile: docker/agent_api.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
