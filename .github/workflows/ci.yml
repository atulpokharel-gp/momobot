name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: 18
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # LINT & CODE QUALITY
  # ============================================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd client && npm ci
          cd ../server && npm ci
          cd ../momobot-agent && npm ci

      - name: Lint Client
        run: cd client && npm run lint --if-present || echo "No lint script"

      - name: Lint Server
        run: cd server && npm run lint --if-present || echo "No lint script"

  # ============================================
  # BUILD PIPELINE
  # ============================================
  build:
    needs: lint
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Client
        run: |
          cd client
          npm ci
          npm run build
        env:
          VITE_API_URL: http://localhost:4000/api

      - name: Build Server
        run: |
          cd server
          npm ci
          npm run build --if-present

      - name: Build Agent
        run: |
          cd momobot-agent
          npm ci
          npm run build --if-present

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            client/dist
            server/dist
          retention-days: 5

  # ============================================
  # UNIT TESTS
  # ============================================
  test:
    needs: build
    runs-on: ubuntu-latest
    name: Unit Tests

    services:
      sqlite:
        image: nouchka/sqlite3
        options: --health-cmd="sqlite3 /tmp/test.db" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Test Client
        run: |
          cd client
          npm ci
          npm run test --if-present || echo "No test script"

      - name: Test Server
        run: |
          cd server
          npm ci
          npm run test --if-present || echo "No test script"
        env:
          DATABASE_PATH: /tmp/test.db

      - name: Test Agent
        run: |
          cd momobot-agent
          npm ci
          npm run test --if-present || echo "No test script"

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  # ============================================
  # SECURITY SCAN
  # ============================================
  security:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true

  # ============================================
  # DOCKER BUILD & PUSH
  # ============================================
  docker:
    needs: [ build, test, security ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build & Push Docker Images

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Server)
        id: meta_server
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/server
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Server image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Client)
        id: meta_client
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/client
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Client image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta_client.outputs.tags }}
          labels: ${{ steps.meta_client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Agent image
        uses: docker/build-push-action@v4
        with:
          context: ./momobot-agent
          file: ./momobot-agent/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/agent:latest
          labels: version=latest

  # ============================================
  # DEPLOY TO STAGING (Optional)
  # ============================================
  deploy-staging:
    needs: docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add your deployment script here
          # Example: docker-compose -f docker-compose.staging.yml up -d

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests on staging..."
          # Add your smoke test script here

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Staging Deployment: *${{ job.status }}*\nBranch: `${{ github.ref }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # DEPLOY TO PRODUCTION (Optional)
  # ============================================
  deploy-production:
    needs: [ build, test ]
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore: release')
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to production environment..."
          # Add your deployment script here
          # Example: docker-compose -f docker-compose.prod.yml up -d

      - name: Run regression tests
        run: |
          echo "🧪 Running regression tests on production..."
          # Add your regression test script here

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            Production deployment successful!
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production Deployment: *${{ job.status }}*\nRelease: v${{ github.run_number }}\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # FINAL STATUS
  # ============================================
  status:
    needs: [ lint, build, test, security ]
    if: always()
    runs-on: ubuntu-latest
    name: Pipeline Status

    steps:
      - name: Check Pipeline Status
        run: |
          echo "✅ Pipeline completed!"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
        if: always()

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
            {
              "text": "CI/CD Pipeline ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI/CD Pipeline Summary*\n```\nLint: ${{ needs.lint.result }}\nBuild: ${{ needs.build.result }}\nTest: ${{ needs.test.result }}\nSecurity: ${{ needs.security.result }}\n```"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
